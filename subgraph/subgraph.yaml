specVersion: 1.0.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: ActionLog
    network: base-sepolia
    source:
      address: "0x0000000000000000000000000000000000000000"
      abi: ActionLog
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Action
        - DailyPnL
      abis:
        - name: ActionLog
          file: ./abis/ActionLog.json
      eventHandlers:
        - event: ActionExecuted(indexed uint256,indexed address,indexed address,uint256,uint256,string,uint256)
          handler: handleActionExecuted
      file: ./src/mappings.ts
