name: Sentinel Agent

on:
  schedule:
    - cron: '0 * * * *'   # every hour
  workflow_dispatch:        # manual trigger button in GitHub UI

jobs:
  run-agent:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: agent/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run one agent cycle
        run: python -m agent.main
        env:
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          BASE_SEPOLIA_RPC: ${{ secrets.BASE_SEPOLIA_RPC }}
          PIMLICO_API_KEY: ${{ secrets.PIMLICO_API_KEY }}
          PINATA_JWT: ${{ secrets.PINATA_JWT }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ONEINCH_API_KEY: ${{ secrets.ONEINCH_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
